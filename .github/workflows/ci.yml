name: CI

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Shellcheck
        run: shellcheck ./*.sh

      - name: Check formatting
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type check
        run: deno task check

      - name: Run tests
        run: deno task test
