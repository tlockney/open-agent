name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PREFIX="open-agent-${VERSION}"
          tar czf "${PREFIX}.tar.gz" \
            --transform "s,^,${PREFIX}/," \
            src/ \
            deno.json \
            oa-wrapper.sh \
            com.open-agent.daemon.plist \
            install.sh \
            open-agent-hook.sh \
            ssh_config.example

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: open-agent-*.tar.gz
          generate_release_notes: true
