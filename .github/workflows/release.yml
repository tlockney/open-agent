name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Shellcheck
        run: shellcheck ./*.sh

      - name: Check formatting
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type check
        run: deno task check

      - name: Run tests
        run: deno task test

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build release tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PREFIX="open-agent-${VERSION}"
          tar czf "${PREFIX}.tar.gz" \
            --transform "s,^,${PREFIX}/," \
            src/ \
            deno.json \
            oa-wrapper.sh \
            com.open-agent.daemon.plist \
            install.sh \
            open-agent-hook.sh \
            ssh_config.example

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: open-agent-*.tar.gz
          generate_release_notes: true
